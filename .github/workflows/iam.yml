name: IAM Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image'
        required: true
        default: 'latest'

jobs:
  ci:
    uses: ./.github/workflows/java-ci.yml
    with:
      working-directory: ./
      service-name: iam-service
    secrets: inherit
  
  trufflehog:
    uses: ./.github/workflows/trufflehog.yml
    with:
      working-directory: ./
      service-name: iam-service
    secrets: inherit

  cd-publish:
    needs: [ci, trufflehog]
    uses: ./.github/workflows/docker-cd.yml
    with:
      working-directory: ./
      image-name: iam-service
    secrets: inherit

  deploy:
    needs: [cd-publish]
    runs-on: self-hosted

    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'    
    
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy compose.yml to Target Machine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "compose.yml"
          target: "/opt/settlehub/iam/"

      - name: Deploy to Target Machine via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IAM_DB_URL: ${{ secrets.IAM_DB_URL }}
          IAM_DB_USERNAME: ${{ secrets.IAM_DB_USERNAME }}
          IAM_DB_PASSWORD: ${{ secrets.IAM_DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          KAFKA_ADDRESS: ${{ secrets.KAFKA_ADDRESS }}
          EUREKA_ADDRESS: ${{ secrets.EUREKA_ADDRESS }}
          IAM_SERVICE_IP: ${{ secrets.IAM_SERVICE_IP }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IAM_DB_URL,IAM_DB_USERNAME,IAM_DB_PASSWORD,JWT_SECRET_KEY,KAFKA_ADDRESS,EUREKA_ADDRESS,IAM_SERVICE_IP,IMAGE_TAG
          script: |
            mkdir -p /opt/settlehub/iam/
            cd /opt/settlehub/iam/

            echo "IAM_DB_URL=$IAM_DB_URL" > .env
            echo "IAM_DB_USERNAME=$IAM_DB_USERNAME" >> .env
            echo "IAM_DB_PASSWORD=$IAM_DB_PASSWORD" >> .env
            echo "JWT_SECRET_KEY=$JWT_SECRET_KEY" >> .env
            echo "KAFKA_ADDRESS=$KAFKA_ADDRESS" >> .env
            echo "EUREKA_ADDRESS=$EUREKA_ADDRESS" >> .env
            echo "IAM_SERVICE_IP=$IAM_SERVICE_IP" >> .env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/settlehub/iam-service:$IMAGE_TAG
            docker compose up -d
            docker image prune -a -f --filter "until=24h"