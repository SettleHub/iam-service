name: Reusable Docker CD

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      image-name:
        required: true
        type: string

jobs:
  docker-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>${{ github.actor }}</username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Make Maven Wrapper Executable
        run: chmod +x  ${{ inputs.working-directory }}/mvnw 

      - name: Build Maven Project (Skip Tests)
        working-directory:  ${{ inputs.working-directory }}
        run: ./mvnw clean package -DskipTests 

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          push: true
          tags: ghcr.io/settlehub/${{ inputs.image-name }}:latest
