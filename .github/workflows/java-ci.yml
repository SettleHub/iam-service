name: Reusable Java CI

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      service-name:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>${{ github.actor }}</username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Make Maven Wrapper Executable
        run: chmod +x ${{ inputs.working-directory }}/mvnw

      - name: Build with Maven
        working-directory: ${{ inputs.working-directory }}
        run: ./mvnw clean verify
